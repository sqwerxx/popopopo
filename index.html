<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Огонёк: Начало</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <!-- Окно диалога -->
        <div id="dialogue-box" class="hidden">
            <div id="speaker-name">Имя</div>
            <div id="dialogue-text">Текст диалога...</div>
            <div id="dialogue-hint">Нажми [E] или кнопку ниже, чтобы продолжить</div>
        </div>

        <!-- Управление -->
        <div class="controls">
            <div class="move-btns">
                <button id="up">▲</button>
                <div>
                    <button id="left">◀️</button>
                    <button id="down">▼</button>
                    <button id="right">▶️</button>
                </div>
            </div>
            <button id="action-btn">ДЕЙСТВИЕ (E)</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
